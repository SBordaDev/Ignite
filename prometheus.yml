global:
  scrape_interval: 5s # Cada 5 segundos recolectará los datos

scrape_configs:
  - job_name: 'ignite-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # host.docker.internal es la magia de Docker para hablar con tu localhost
      - targets: ['host.docker.internal:8080']